name: Publish release builds and Docker image

on:
  release:
    types: [published]

jobs:
  build_and_push:
    name: Build releases and Publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in a docker image
        uses: docker/build-push-action@v6
        with:
          load: true
          tags: cstopdown-builder

      - name: Extract artifacts from builder
        run: |
          mkdir dist &&
          docker create --name dummy cstopdown-builder &&
          docker cp dummy:/app/html/build/dist ./dist/html &&
          docker cp dummy:/app/desktop/build/libs ./dist/desktop &&
          docker cp dummy:/app/server/build/libs ./dist/server &&
          docker rm -f dummy

      - name: Archive Desktop Release
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: 'cstopdown-desktop.zip'
          directory: 'dist/desktop'
      
      - name: Archive Server Release
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: 'cstopdown-server.zip'
          directory: 'dist/server'
      
      - name: Archive Web Release
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: 'cstopdown-web.zip'
          directory: 'dist/html'

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/desktop/cstopdown-desktop.zip
            dist/server/cstopdown-server.zip
            dist/html/cstopdown-web.zip
      
      - name: Install butler (itch.io CLI)
        run: |
          curl -L --retry 5 --retry-all-errors -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Publish web build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist/html nicktoony/cs-topdown:html5 --userversion "${{ github.ref_name }}" --ignore "*.zip"

      - name: Publish desktop build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist/desktop nicktoony/cs-topdown:desktop --userversion "${{ github.ref_name }}" --ignore "*.zip"

      - name: Publish server build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist/server nicktoony/cs-topdown:server --userversion "${{ github.ref_name }}" --ignore "*.zip"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push server docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: ghcr.io/${{ steps.image.outputs.repo }}:server-latest,ghcr.io/${{ steps.image.outputs.repo }}:server-${{ github.ref_name }}
          file: ./Dockerfile.server

      - name: Build and push web docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          tags: ghcr.io/${{ steps.image.outputs.repo }}:web-latest,ghcr.io/${{ steps.image.outputs.repo }}:web-${{ github.ref_name }}
          file: ./Dockerfile.web